openapi: 3.1.0
info:
  title: GPC Container Phase I Control Plane API
  version: 1.3.0-draft
  description: >-
    班级范围的 CPU/Ascend NPU 工作区、终端证据、培训期处置、长期任务和运营读模型契约。
    受保护资源按稳定主体、权限、班级范围、所有权和任务授权共同判定；无权限目标使用不可枚举响应。
servers:
  - url: /v1
security:
  - bearerAuth: []
paths:
  /me:
    get:
      operationId: getCurrentSubject
      summary: 获取稳定主体与仅供界面优化的有效能力
      responses: {'200': {$ref: '#/components/responses/Subject'}}
  /classes:
    get: {operationId: listClasses, summary: 列出当前主体有权访问的班级, responses: {'200': {$ref: '#/components/responses/ClassList'}}}
    post: {operationId: createClass, summary: 创建班级, parameters: [{$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/ClassCommand'}, responses: {'201': {$ref: '#/components/responses/Class'}, '403': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/members:
    get: {operationId: listClassMembers, summary: 列出班级成员, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/MemberList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    put: {operationId: upsertClassMember, summary: 添加或调整未移除的班级成员, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/MemberCommand'}, responses: {'200': {$ref: '#/components/responses/Member'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/members/{subjectId}:
    delete: {operationId: removeClassMember, summary: 提交成员移除及受影响创建操作协调, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/SubjectId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /permissions:
    get: {operationId: listPermissions, summary: 查询可绑定的权限定义, responses: {'200': {$ref: '#/components/responses/PermissionList'}}}
    post: {operationId: createPermission, summary: 创建权限定义, parameters: [{$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/PermissionCreate'}, responses: {'201': {$ref: '#/components/responses/Permission'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /permissions/{permissionId}:
    patch: {operationId: updatePermission, summary: 修改或停用权限定义；权限 action 不可变, parameters: [{$ref: '#/components/parameters/PermissionId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/PermissionUpdate'}, responses: {'200': {$ref: '#/components/responses/Permission'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: deletePermission, summary: 删除未被角色引用的权限定义, parameters: [{$ref: '#/components/parameters/PermissionId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'204': {description: 已删除}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /roles:
    get: {operationId: listRoles, summary: 查询角色定义, responses: {'200': {$ref: '#/components/responses/RoleList'}}}
    post: {operationId: createRole, summary: 创建角色, parameters: [{$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/RoleCommand'}, responses: {'201': {$ref: '#/components/responses/Role'}}}
  /roles/{roleId}:
    patch: {operationId: updateRole, summary: 修改或停用角色, parameters: [{$ref: '#/components/parameters/RoleId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/RoleCommand'}, responses: {'200': {$ref: '#/components/responses/Role'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: deleteRole, summary: 删除角色定义, parameters: [{$ref: '#/components/parameters/RoleId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'204': {description: 已删除}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /role-bindings:
    get: {operationId: listRoleBindings, summary: 查询范围角色绑定, responses: {'200': {$ref: '#/components/responses/RoleBindingList'}}}
    post: {operationId: createRoleBinding, summary: 创建范围角色绑定, parameters: [{$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/RoleBindingCommand'}, responses: {'201': {$ref: '#/components/responses/RoleBinding'}}}
  /role-bindings/{bindingId}:
    patch: {operationId: updateRoleBinding, summary: 修改或停用角色绑定, parameters: [{$ref: '#/components/parameters/BindingId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/RoleBindingCommand'}, responses: {'200': {$ref: '#/components/responses/RoleBinding'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: deleteRoleBinding, summary: 删除角色绑定, parameters: [{$ref: '#/components/parameters/BindingId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'204': {description: 已删除}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /workspace-profiles:
    get: {operationId: listWorkspaceProfiles, summary: 查询平台批准的工作区 Profile 定义, responses: {'200': {$ref: '#/components/responses/WorkspaceProfileList'}}}
    post: {operationId: createWorkspaceProfile, summary: 创建平台工作区 Profile, parameters: [{$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/WorkspaceProfileCreate'}, responses: {'201': {$ref: '#/components/responses/WorkspaceProfile'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /workspace-profiles/{profileId}:
    patch: {operationId: updateWorkspaceProfile, summary: 修改或普通停用平台工作区 Profile, parameters: [{$ref: '#/components/parameters/ProfileId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/WorkspaceProfileUpdate'}, responses: {'200': {$ref: '#/components/responses/WorkspaceProfile'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: deleteWorkspaceProfile, summary: 删除未被班级启用的 Profile 定义, parameters: [{$ref: '#/components/parameters/ProfileId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'204': {description: 已删除}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /workspace-profiles/{profileId}/revoke:
    post: {operationId: revokeWorkspaceProfile, summary: 因安全或合规撤销 Profile，并协调终止未完成创建及清理, parameters: [{$ref: '#/components/parameters/ProfileId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/ProfileRevocationCommand'}, responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/profiles:
    get: {operationId: listClassProfiles, summary: 列出当前班级可用 CPU/NPU Profile、额度与调度提示, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/ProfileList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/profiles/{profileId}:
    put: {operationId: upsertClassProfileEnablement, summary: 启用或调整班级 Profile 配额, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/ProfileId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/ClassProfileEnablementCommand'}, responses: {'200': {$ref: '#/components/responses/Profile'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: disableClassProfileEnablement, summary: 停用班级 Profile，不终止已接受的普通创建, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/ProfileId'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'204': {description: 已停用}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/workspaces:
    get: {operationId: listClassWorkspaces, summary: 按授权列出班级工作区, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/WorkspaceList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    post: {operationId: createWorkspace, summary: 提交工作区创建, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/WorkspaceCreate'}, responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/workspaces/{workspaceId}:
    get: {operationId: getWorkspace, summary: 获取按授权过滤的工作区与卷状态, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/WorkspaceId'}], responses: {'200': {$ref: '#/components/responses/Workspace'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    delete: {operationId: deleteWorkspace, summary: 提交工作区删除，必须明确选择保留或删除持久数据, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/WorkspaceDeleteCommand'}, responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/workspaces/{workspaceId}/operations:
    get: {operationId: listWorkspaceOperations, summary: 查询工作区操作历史, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/WorkspaceId'}], responses: {'200': {$ref: '#/components/responses/OperationList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/workspaces/{workspaceId}/commands/{command}:
    post: {operationId: commandWorkspace, summary: 提交 start/stop/reset 工作区命令, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/WorkspaceId'}, {$ref: '#/components/parameters/Command'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/volumes:
    get: {operationId: listReusableVolumes, summary: 列出当前主体可重新绑定或单独删除的同班级卷, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/VolumeList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/volumes/{volumeId}:
    delete: {operationId: deleteWorkspaceVolume, summary: 提交未绑定持久卷删除, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/VolumeId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /operations/{operationId}:
    get: {operationId: getOperation, summary: 查询稳定操作状态, parameters: [{$ref: '#/components/parameters/OperationId'}], responses: {'200': {$ref: '#/components/responses/Operation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /operations/{operationId}/retry:
    post: {operationId: retryOperation, summary: 显式重试可恢复失败操作, parameters: [{$ref: '#/components/parameters/OperationId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/terminal-records:
    get: {operationId: listTerminalRecords, summary: 查询本班已过滤终端记录与采集缺口, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/ActorIdQuery'}, {$ref: '#/components/parameters/WorkspaceIdQuery'}, {$ref: '#/components/parameters/DirectionQuery'}, {$ref: '#/components/parameters/FromQuery'}, {$ref: '#/components/parameters/ToQuery'}, {$ref: '#/components/parameters/Cursor'}, {$ref: '#/components/parameters/PageSize'}], responses: {'200': {$ref: '#/components/responses/TerminalRecordList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/training-period:
    get: {operationId: getTrainingPeriod, summary: 查询培训期及处置状态, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/TrainingPeriod'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/training-period/close:
    post: {operationId: closeTrainingPeriod, summary: 提交停止、保留和限制学生访问的班级处置, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/training-period/exports:
    post: {operationId: exportTrainingPeriodData, summary: 提交授权教师或管理员的班级资料导出, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/exports/{exportId}/download:
    get: {operationId: downloadTrainingPeriodExport, summary: 下载已完成且仍有效的班级导出；每次下载重新授权并审计, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/ExportId'}], responses: {'200': {$ref: '#/components/responses/ExportDownload'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/training-period/cleanup:
    post: {operationId: cleanupTrainingPeriod, summary: 提交仅授权管理员可发起的显式清理, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/tasks:
    get: {operationId: listLongRunningTasks, summary: 按任务授权列出长期任务, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/TaskList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    post: {operationId: submitLongRunningTask, summary: 提交仅由控制面管理的长期任务, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/TaskCommand'}, responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/tasks/{taskId}:
    get: {operationId: getLongRunningTask, summary: 查询授权范围内的长期任务详情, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/TaskId'}], responses: {'200': {$ref: '#/components/responses/Task'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/tasks/{taskId}/commands/{taskCommand}:
    post: {operationId: commandLongRunningTask, summary: 提交长期任务取消命令, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/TaskId'}, {$ref: '#/components/parameters/TaskCommand'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '409': {$ref: '#/components/responses/Conflict'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/tasks/{taskId}/grants:
    get: {operationId: listTaskGrants, summary: 查询任务范围授权, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/TaskId'}], responses: {'200': {$ref: '#/components/responses/TaskGrantList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
    post: {operationId: grantTaskAccess, summary: 提交任务访问或管理授权, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/TaskId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], requestBody: {$ref: '#/components/requestBodies/TaskGrantCommand'}, responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/tasks/{taskId}/grants/{grantId}:
    delete: {operationId: revokeTaskAccess, summary: 提交任务授权撤销, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/TaskId'}, {$ref: '#/components/parameters/GrantId'}, {$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/Traceparent'}, {$ref: '#/components/parameters/Tracestate'}], responses: {'202': {$ref: '#/components/responses/AcceptedOperation'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/audit-records:
    get: {operationId: listClassAuditRecords, summary: 查询班级范围审计证据, parameters: [{$ref: '#/components/parameters/ClassId'}, {$ref: '#/components/parameters/Cursor'}, {$ref: '#/components/parameters/PageSize'}], responses: {'200': {$ref: '#/components/responses/AuditList'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /classes/{classId}/operational-summary:
    get: {operationId: getClassOperationalSummary, summary: 查询班级操作积压、采集缺口和受控资源摘要, parameters: [{$ref: '#/components/parameters/ClassId'}], responses: {'200': {$ref: '#/components/responses/ClassOperationalSummary'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /platform/operational-summary:
    get: {operationId: getPlatformOperationalSummary, summary: 查询仅平台授权者可见的节点与服务运营摘要, responses: {'200': {$ref: '#/components/responses/PlatformOperationalSummary'}, '404': {$ref: '#/components/responses/NotDisclosed'}}}
  /healthz:
    get: {security: [], operationId: healthz, summary: 存活检查, responses: {'200': {description: 存活}}}
  /readyz:
    get: {security: [], operationId: readyz, summary: 就绪检查, responses: {'200': {description: 就绪}, '503': {description: 未就绪}}}
components:
  parameters:
    ClassId: {name: classId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    SubjectId: {name: subjectId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    WorkspaceId: {name: workspaceId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    VolumeId: {name: volumeId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    OperationId: {name: operationId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    TaskId: {name: taskId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    GrantId: {name: grantId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    ExportId: {name: exportId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    PermissionId: {name: permissionId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    ProfileId: {name: profileId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    RoleId: {name: roleId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    BindingId: {name: bindingId, in: path, required: true, schema: {$ref: '#/components/schemas/Id'}}
    Command: {name: command, in: path, required: true, schema: {type: string, enum: [start, stop, reset]}}
    TaskCommand: {name: taskCommand, in: path, required: true, schema: {type: string, enum: [cancel]}}
    ActorIdQuery: {name: actorId, in: query, required: false, schema: {$ref: '#/components/schemas/Id'}}
    WorkspaceIdQuery: {name: workspaceId, in: query, required: false, schema: {$ref: '#/components/schemas/Id'}}
    DirectionQuery: {name: direction, in: query, required: false, schema: {type: string, enum: [input, stdout, stderr, capture_gap]}}
    FromQuery: {name: from, in: query, required: false, schema: {type: string, format: date-time}}
    ToQuery: {name: to, in: query, required: false, schema: {type: string, format: date-time}}
    Cursor: {name: cursor, in: query, required: false, schema: {type: string, minLength: 1}}
    PageSize: {name: pageSize, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}
    IdempotencyKey: {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
    Traceparent: {name: traceparent, in: header, required: false, schema: {type: string}}
    Tracestate: {name: tracestate, in: header, required: false, schema: {type: string}}
  requestBodies:
    ClassCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ClassCommand'}}}}
    MemberCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/MemberCommand'}}}}
    PermissionCreate: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PermissionCreate'}}}}
    PermissionUpdate: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PermissionUpdate'}}}}
    RoleCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RoleCommand'}}}}
    RoleBindingCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RoleBindingCommand'}}}}
    WorkspaceCreate: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceCreate'}}}}
    WorkspaceDeleteCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceDeleteCommand'}}}}
    WorkspaceProfileCreate: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceProfileCreate'}}}}
    WorkspaceProfileUpdate: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkspaceProfileUpdate'}}}}
    ProfileRevocationCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ProfileRevocationCommand'}}}}
    ClassProfileEnablementCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ClassProfileEnablementCommand'}}}}
    TaskCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TaskCommand'}}}}
    TaskGrantCommand: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TaskGrantCommand'}}}}
  responses:
